name: Build & Deploy a GitHub Pages

# Se ejecuta automáticamente cada vez que hay un push a la rama main
on:
  push:
    branches: ["main"]
  # También permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita ejecuciones duplicadas/superpuestas del mismo pipeline
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ---------- ETAPA 1: BUILD ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas (test)
        run: npm run test --if-present

      - name: Compilar el proyecto (build)
        run: npm run build

      - name: Preparar artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ---------- ETAPA 2: DEPLOY ----------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
